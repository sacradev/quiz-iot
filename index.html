                {id:183,subject:"Lei de Ohm",question:"No fenômeno da supercondutividade, a resistência elétrica de um material se torna:",options:["Infinitamente alta","Praticamente zero","Negativa","Constante em 100Ω"],correct:1,explanation:"Em supercondutividade (temperaturas muito baixas), resistência cai para essencialmente zero, permitindo corrente sem perdas."},
                {id:184,subject:"Microcontroladores",question:"A principal diferença entre arquitetura de Von Neumann e Harvard em microcontroladores é:",options:["Von Neumann tem memórias separadas para programa e dados","Harvard tem barramento único para programa e dados","Harvard tem memórias separadas para programa e dados","Von Neumann é mais rápida"],correct:2,explanation:"Harvard: barramentos e memórias separadas para programa e dados, permitindo acesso simultâneo (mais rápido)."},
                {id:185,subject:"ADC",question:"O erro de quantização em um ADC é causado por:",options:["Ruído térmico nos componentes","Representação de valores analógicos contínuos por níveis digitais discretos","Variações na tensão de referência","Temperatura ambiente elevada"],correct:1,explanation:"Quantização divide faixa analógica em degraus discretos, gerando erro entre valor real e nível mais próximo."},
                {id:186,subject:"Componentes",question:"Um SCR (Silicon Controlled Rectifier) é disparado aplicando-se pulso no:",options:["Terminal anodo","Terminal gate (porta)","Terminal catodo","Não requer disparo externo"],correct:1,explanation:"SCR permanece bloqueado até receber pulso de corrente no gate, então conduz até corrente cair abaixo do limiar."},
                {id:187,subject:"Circuitos",question:"O teorema de Norton representa um circuito complexo como:",options:["Fonte de corrente em paralelo com resistência","Fonte de tensão em série com resistência","Apenas uma resistência equivalente","Apenas uma fonte ideal"],correct:0,explanation:"Equivalente Norton: fonte de corrente (In) em paralelo com resistência (Rn), dual do teorema de Thévenin."},
                {id:188,subject:"Microcontroladores",question:"DMA (Direct Memory Access) em microcontroladores permite:",options:["Transferência de dados entre periféricos e memória sem intervenção da CPU","Controle direto do clock do sistema","Conversão analógica-digital acelerada","Modulação de sinais PWM"],correct:0,explanation:"DMA libera CPU transferindo dados diretamente entre periféricos e memória, melhorando performance."},
                {id:189,subject:"Potência",question:"A corrente nominal de um componente indica:",options:["Corrente máxima segura de operação contínua","Corrente mínima para funcionamento","Corrente instantânea de pico","Corrente de curto-circuito"],correct:0,explanation:"Corrente nominal é o valor máximo que o componente pode conduzir continuamente sem danos."},
                {id:190,subject:"Comunicação",question:"CRC (Cyclic Redundancy Check) em comunicação digital serve para:",options:["Compressão de dados transmitidos","Detecção de erros em dados transmitidos","Criptografia de informações sensíveis","Aumento da velocidade de transmissão"],correct:1,explanation:"CRC é algoritmo de checksum que detecta erros de transmissão comparando valor calculado com valor recebido."},
                {id:191,subject:"Lei de Ohm",question:"A resistividade (ρ) de um material é medida em:",options:["Ohms (Ω)","Ohm-metro (Ω·m)","Ampère por metro (A/m)","Volt por metro (V/m)"],correct:1,explanation:"Resistividade é propriedade do material, relacionada à resistência por R = ρL/A, medida em Ω·m."},
                {id:192,subject:"Microcontroladores",question:"FPGA (Field-Programmable Gate Array) permite:",options:["Apenas armazenamento de dados não-voláteis","Implementação de lógica digital configurável pelo usuário","Exclusivamente geração de clock interno","Medição de temperatura do chip"],correct:1,explanation:"FPGA contém blocos lógicos reconfiguráveis, permitindo implementar circuitos digitais customizados em hardware."},
                {id:193,subject:"ADC",question:"A técnica de oversampling em ADCs melhora principalmente:",options:["Velocidade de conversão","Resolução efetiva e relação sinal/ruído","Custo de implementação","Tamanho físico do componente"],correct:1,explanation:"Oversampling (amostragem acima da taxa Nyquist) permite filtrar ruído e aumentar resolução efetiva através de média."},
                {id:194,subject:"Componentes",question:"Um TRIAC é um componente semicondutor que conduz:",options:["Corrente alternada em ambos os sentidos","Corrente contínua em um único sentido","Apenas semiciclo positivo de CA","Apenas semiciclo negativo de CA"],correct:0,explanation:"TRIAC = TRIode AC, conduz CA bidirecionalmente quando disparado, usado em controle de potência AC."},
                {id:195,subject:"Circuitos",question:"Em um circuito RC, a constante de tempo τ (tau) é calculada por:",options:["R + C","R × C","R / C","C / R"],correct:1,explanation:"Constante de tempo τ = R×C (segundos), determina velocidade de carga/descarga do capacitor."},
                {id:196,subject:"Microcontroladores",question:"Brownout reset em microcontroladores ocorre quando:",options:["Temperatura excede limite máximo","Tensão de alimentação cai abaixo do mínimo operacional","Clock é interrompido abruptamente","Memória flash está corrompida"],correct:1,explanation:"Brownout detector reseta MCU quando tensão cai demais, prevenindo operação instável em subtensão."},
                {id:197,subject:"Potência",question:"Em um transformador ideal, a relação entre tensões primária e secundária é determinada por:",options:["Razão V1/V2 = N1/N2 (número de espiras)","Razão V1/V2 = N2/N1","Tensões sempre iguais (V1 = V2)","Correntes no primário e secundário"],correct:0,explanation:"Transformador ideal: V1/V2 = N1/N2, onde N é número de espiras em cada enrolamento."},
                {id:198,subject:"Comunicação",question:"A principal diferença entre protocolos TCP e UDP é que:",options:["TCP garante entrega confiável dos dados, UDP não","UDP é mais confiável que TCP","TCP é mais rápido que UDP","São protocolos idênticos"],correct:0,explanation:"TCP tem controle de erros e retransmissão (confiável mas mais lento). UDP é mais rápido mas sem garantia de entrega."},
                {id:199,subject:"Lei de Ohm",question:"Um potenciômetro é classificado como:",options:["Resistor de valor fixo","Resistor de valor variável ajustável","Capacitor variável","Indutor ajustável"],correct:1,explanation:"Potenciômetro é resistor variável com três terminais, permitindo ajuste manual da resistência."},
                {id:200,subject:"Microcontroladores",question:"A principal diferença entre memória ROM e RAM é que:",options:["ROM retém dados sem alimentação, RAM perde dados sem energia","RAM é mais rápida que ROM sempre","ROM pode ser reescrita infinitamente","RAM ocupa mais espaço físico"],correct:0,explanation:"ROM (Read-Only Memory) é não-volátil. RAM (Random Access Memory) é volátil, perdendo dados sem alimentação."}

            ],
            
            stats: { total: 0, correct: 0, streak: 0, wrong: [], answered: new Set() },
            current: null,
            selected: null,
            
            init() {
                this.loadStats();
                this.updateDisplay();
            },
            
            loadStats() {
                const saved = localStorage.getItem('quizIoTStats');
                if (saved) {
                    const data = JSON.parse(saved);
                    this.stats = { ...this.stats, ...data, answered: new Set(data.answered || []), wrong: data.wrong || [] };
                }
            },
            
            saveStats() {
                localStorage.setItem('quizIoTStats', JSON.stringify({ ...this.stats, answered: Array.from(this.stats.answered) }));
            },
            
            updateDisplay() {
                document.getElementById('statTotal').textContent = this.stats.total;
                document.getElementById('statCorrect').textContent = this.stats.correct;
                const rate = this.stats.total > 0 ? Math.round((this.stats.correct/this.stats.total)*100) : 0;
                document.getElementById('statRate').textContent = rate + '%';
                document.getElementById('statStreak').textContent = this.stats.streak;
                const progress = (this.stats.answered.size / this.questions.length) * 100;
                document.getElementById('progressFill').style.width = progress + '%';
                document.getElementById('progressText').textContent = `${this.stats.answered.size} de ${this.questions.length} questões únicas`;
            },
            
            startQuiz() {
                document.getElementById('homeScreen').style.display = 'none';
                document.getElementById('questionArea').classList.add('active');
                this.loadQuestion();
            },
            
            loadQuestion() {
                const mode = document.getElementById('modeSelect').value;
                const subject = document.getElementById('subjectSelect').value;
                let pool = this.questions.filter(q => subject === 'all' || q.subject === subject);
                if (mode === 'new') {
                    pool = pool.filter(q => !this.stats.answered.has(q.id));
                    if (pool.length === 0) pool = this.questions;
                } else if (mode === 'review') {
                    pool = pool.filter(q => this.stats.wrong.includes(q.id));
                    if (pool.length === 0) { alert('Nenhuma questão errada para revisar!'); this.goBack(); return; }
                }
                this.current = pool[Math.floor(Math.random() * pool.length)];
                this.selected = null;
                this.displayQuestion();
            },
            
            displayQuestion() {
                document.getElementById('questionNumber').textContent = `Questão ${this.current.id} de ${this.questions.length}`;
                document.getElementById('questionSubject').textContent = this.current.subject;
                document.getElementById('questionText').textContent = this.current.question;
                const container = document.getElementById('optionsContainer');
                container.innerHTML = '';
                this.current.options.forEach((opt, i) => {
                    const div = document.createElement('div');
                    div.className = 'option';
                    div.innerHTML = `<span class="option-letter">${String.fromCharCode(65+i)}</span>${opt}`;
                    div.onclick = () => this.selectOption(i, div);
                    container.appendChild(div);
                });
                document.getElementById('feedback').classList.remove('show');
                document.getElementById('btnConfirm').classList.remove('hidden');
                document.getElementById('btnNext').classList.add('hidden');
            },
            
            selectOption(index, element) {
                document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
                element.classList.add('selected');
                this.selected = index;
            },
            
            confirmAnswer() {
                if (this.selected === null) { alert('Por favor, selecione uma resposta!'); return; }
                this.stats.total++;
                this.stats.answered.add(this.current.id);
                const isCorrect = this.selected === this.current.correct;
                const feedback = document.getElementById('feedback');
                const options = document.querySelectorAll('.option');
                options.forEach(el => el.classList.add('disabled'));
                if (isCorrect) {
                    this.stats.correct++;
                    this.stats.streak++;
                    this.stats.wrong = this.stats.wrong.filter(id => id !== this.current.id);
                    options[this.selected].classList.add('correct');
                    feedback.className = 'feedback show correct';
                    document.getElementById('feedbackTitle').textContent = '✓ Resposta Correta!';
                } else {
                    this.stats.streak = 0;
                    if (!this.stats.wrong.includes(this.current.id)) this.stats.wrong.push(this.current.id);
                    options[this.selected].classList.add('incorrect');
                    options[this.current.correct].classList.add('correct');
                    feedback.className = 'feedback show incorrect';
                    document.getElementById('feedbackTitle').textContent = `✗ Resposta Incorreta! Correta: ${String.fromCharCode(65 + this.current.correct)}`;
                }
                document.getElementById('feedbackText').textContent = this.current.explanation;
                this.saveStats();
                this.updateDisplay();
                document.getElementById('btnConfirm').classList.add('hidden');
                document.getElementById('btnNext').classList.remove('hidden');
            },
            
            nextQuestion() { this.loadQuestion(); },
            
            goBack() {
                document.getElementById('questionArea').classList.remove('active');
                document.getElementById('homeScreen').style.display = 'block';
                this.updateDisplay();
            },
            
            showStats() {
                const content = document.getElementById('statsContent');
                const rate = this.stats.total > 0 ? Math.round((this.stats.correct/this.stats.total)*100) : 0;
                content.innerHTML = `
                    <div class="modal-stat"><span class="modal-stat-label">Total Respondidas</span><span class="modal-stat-value">${this.stats.total}</span></div>
                    <div class="modal-stat"><span class="modal-stat-label">Acertos</span><span class="modal-stat-value">${this.stats.correct}</span></div>
                    <div class="modal-stat"><span class="modal-stat-label">Erros</span><span class="modal-stat-value">${this.stats.total - this.stats.correct}</span></div>
                    <div class="modal-stat"><span class="modal-stat-label">Taxa de Acerto</span><span class="modal-stat-value">${rate}%</span></div>
                    <div class="modal-stat"><span class="modal-stat-label">Sequência Atual</span><span class="modal-stat-value">${this.stats.streak}</span></div>
                    <div class="modal-stat"><span class="modal-stat-label">Questões Únicas Respondidas</span><span class="modal-stat-value">${this.stats.answered.size}/${this.questions.length}</span></div>
                    <div class="modal-stat"><span class="modal-stat-label">Questões para Revisar</span><span class="modal-stat-value">${this.stats.wrong.length}</span></div>
                `;
                document.getElementById('statsModal').classList.add('show');
            },
            
            closeStats() { document.getElementById('statsModal').classList.remove('show'); },
            
            resetConfirm() {
                if (confirm('Tem certeza que deseja resetar TODO o seu progresso? Esta ação não pode ser desfeita!')) {
                    this.stats = { total: 0, correct: 0, streak: 0, wrong: [], answered: new Set() };
                    this.saveStats();
                    this.updateDisplay();
                    alert('✓ Progresso resetado com sucesso!');
                }
            }
        };
        
        app.init();
    </script>
</body>
</html>
