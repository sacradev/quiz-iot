<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Quiz IoT & Eletrônica - 200 Questões</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .container { max-width: 650px; margin: 0 auto; padding: 20px; padding-bottom: 100px; }
        header { text-align: center; padding: 25px 0; border-bottom: 2px solid #333; margin-bottom: 25px; }
        header h1 { font-size: 1.8em; color: #00d4ff; margin-bottom: 8px; }
        header p { font-size: 0.9em; color: #888; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 25px; }
        .stat { background: #16213e; padding: 15px 10px; border-radius: 12px; text-align: center; }
        .stat-value { font-size: 1.6em; font-weight: bold; color: #00d4ff; }
        .stat-label { font-size: 0.75em; color: #888; margin-top: 5px; }
        .progress-container { margin-bottom: 25px; }
        .progress-bar { height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00d4ff 0%, #00c853 100%); transition: width 0.3s; width: 0%; }
        .progress-text { font-size: 0.8em; color: #666; margin-top: 8px; text-align: right; }
        .filters { background: #16213e; padding: 18px; border-radius: 12px; margin-bottom: 25px; }
        .filter-label { font-size: 0.85em; color: #888; margin-bottom: 10px; display: block; font-weight: 600; }
        .filter-select { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #333; background: #1a1a2e; color: #eee; font-size: 1em; margin-bottom: 15px; cursor: pointer; }
        .menu { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        .menu-row { display: flex; gap: 12px; }
        .menu-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 1em; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .menu-btn.primary { background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%); color: #000; }
        .menu-btn.secondary { background: #16213e; color: #eee; border: 1px solid #333; }
        .menu-btn:active { transform: scale(0.97); }
        .question-area { display: none; }
        .question-area.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #333; }
        .question-number { font-size: 0.9em; color: #00d4ff; font-weight: bold; }
        .question-subject { font-size: 0.8em; color: #888; background: #16213e; padding: 6px 12px; border-radius: 20px; }
        .question-text { font-size: 1.15em; line-height: 1.7; margin-bottom: 30px; color: #fff; }
        .options { display: flex; flex-direction: column; gap: 14px; margin-bottom: 25px; }
        .option { padding: 18px; background: #16213e; border: 2px solid #333; border-radius: 12px; cursor: pointer; transition: all 0.2s; line-height: 1.5; }
        .option:active { transform: scale(0.98); }
        .option.selected { border-color: #00d4ff; background: #1a2a4a; }
        .option.correct { border-color: #00c853; background: #1a3a2a; }
        .option.incorrect { border-color: #ff5252; background: #3a1a1a; }
        .option.disabled { pointer-events: none; opacity: 0.8; }
        .option-letter { display: inline-block; width: 32px; height: 32px; line-height: 32px; text-align: center; background: #333; border-radius: 8px; margin-right: 14px; font-weight: bold; font-size: 0.95em; }
        .option.selected .option-letter { background: #00d4ff; color: #000; }
        .option.correct .option-letter { background: #00c853; color: #000; }
        .option.incorrect .option-letter { background: #ff5252; color: #fff; }
        .feedback { padding: 22px; border-radius: 12px; margin-bottom: 25px; display: none; }
        .feedback.show { display: block; }
        .feedback.correct { background: #1a3a2a; border-left: 5px solid #00c853; }
        .feedback.incorrect { background: #3a1a1a; border-left: 5px solid #ff5252; }
        .feedback-title { font-size: 1.15em; font-weight: bold; margin-bottom: 12px; }
        .feedback.correct .feedback-title { color: #00c853; }
        .feedback.incorrect .feedback-title { color: #ff5252; }
        .feedback-text { font-size: 1em; line-height: 1.6; color: #ccc; }
        .action-buttons { display: flex; gap: 12px; }
        .action-btn { flex: 1; padding: 18px; border: none; border-radius: 12px; font-size: 1.05em; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .action-btn.confirm { background: #00d4ff; color: #000; }
        .action-btn.next { background: #00c853; color: #000; }
        .action-btn.back { background: #333; color: #eee; }
        .action-btn:active { transform: scale(0.97); }
        .hidden { display: none !important; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.92); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal { background: #16213e; border-radius: 18px; padding: 30px; max-width: 450px; width: 100%; max-height: 85vh; overflow-y: auto; }
        .modal h2 { color: #00d4ff; margin-bottom: 25px; text-align: center; font-size: 1.5em; }
        .modal-stat { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #333; }
        .modal-stat:last-child { border-bottom: none; }
        .modal-stat-label { color: #888; font-size: 0.95em; }
        .modal-stat-value { color: #00d4ff; font-weight: bold; font-size: 1.05em; }
        .modal-close { width: 100%; padding: 16px; margin-top: 25px; background: #333; border: none; border-radius: 10px; color: #eee; font-size: 1.05em; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ Quiz IoT & Eletrônica</h1>
            <p>200 Questões Completas • Modo Offline</p>
        </header>

        <div id="homeScreen">
            <div class="stats">
                <div class="stat"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Respondidas</div></div>
                <div class="stat"><div class="stat-value" id="statCorrect">0</div><div class="stat-label">Acertos</div></div>
                <div class="stat"><div class="stat-value" id="statRate">0%</div><div class="stat-label">Taxa</div></div>
                <div class="stat"><div class="stat-value" id="statStreak">0</div><div class="stat-label">Sequência</div></div>
            </div>

            <div class="progress-container">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="progress-text" id="progressText">0 de 200 questões únicas</div>
            </div>

            <div class="filters">
                <label class="filter-label">Modo de Estudo</label>
                <select class="filter-select" id="modeSelect">
                    <option value="random">🎲 Modo Aleatório</option>
                    <option value="new">🆕 Apenas Questões Novas</option>
                    <option value="review">🔄 Revisar Questões Erradas</option>
                </select>
                <label class="filter-label">Filtrar por Assunto</label>
                <select class="filter-select" id="subjectSelect">
                    <option value="all">📚 Todos os Assuntos</option>
                    <option value="Lei de Ohm">⚡ Lei de Ohm / Cálculos</option>
                    <option value="Portas Lógicas">🔌 Portas Lógicas</option>
                    <option value="Circuitos">🔧 Circuitos Série/Paralelo</option>
                    <option value="Componentes">🔩 Componentes Eletrônicos</option>
                    <option value="ADC">📊 ADC / Sensores</option>
                    <option value="Potência">⚙️ Potência / Energia</option>
                    <option value="Grandezas">📏 Grandezas / Unidades</option>
                    <option value="Comunicação">📡 Comunicação / Protocolos</option>
                    <option value="Microcontroladores">💻 Microcontroladores</option>
                </select>
            </div>

            <div class="menu">
                <button class="menu-btn primary" onclick="app.startQuiz()">🚀 Começar a Estudar</button>
                <div class="menu-row">
                    <button class="menu-btn secondary" onclick="app.showStats()">📊 Estatísticas Detalhadas</button>
                    <button class="menu-btn secondary" onclick="app.resetConfirm()">🔄 Resetar Progresso</button>
                </div>
            </div>
        </div>

        <div id="questionArea" class="question-area">
            <div class="question-header">
                <span class="question-number" id="questionNumber"></span>
                <span class="question-subject" id="questionSubject"></span>
            </div>
            <div class="question-text" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
            <div id="feedback" class="feedback">
                <div class="feedback-title" id="feedbackTitle"></div>
                <div class="feedback-text" id="feedbackText"></div>
            </div>
            <div class="action-buttons">
                <button class="action-btn back" onclick="app.goBack()">← Voltar ao Menu</button>
                <button class="action-btn confirm" id="btnConfirm" onclick="app.confirmAnswer()">Confirmar Resposta ✓</button>
                <button class="action-btn next hidden" id="btnNext" onclick="app.nextQuestion()">Próxima Questão →</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="statsModal">
        <div class="modal">
            <h2>📊 Suas Estatísticas</h2>
            <div id="statsContent"></div>
            <button class="modal-close" onclick="app.closeStats()">Fechar</button>
        </div>
    </div>

    <script>
        const app = {
            questions: [
                // SIMULADO 1 - 20 questões
                {id:1,subject:"Grandezas",question:"Qual é a grandeza elétrica utilizada para medir a taxa de consumo ou transferência de energia elétrica ao longo do tempo num dispositivo?",options:["Tensão Elétrica","Corrente Elétrica","Resistência Elétrica","Potência Elétrica"],correct:3,explanation:"A Potência Elétrica (medida em Watts) representa a taxa de consumo ou transferência de energia ao longo do tempo. Calculada por P = V × I"},
                {id:2,subject:"Grandezas",question:"Para otimizar o uso num projeto IoT, precisa-se medir a grandeza de potência elétrica. Qual a unidade de medida padrão para esta grandeza?",options:["Volt (V)","Ampère (A)","Ohm (Ω)","Watt (W)"],correct:3,explanation:"A unidade padrão internacional para potência elétrica é o Watt (W), em homenagem a James Watt."},
                {id:3,subject:"Microcontroladores",question:"Na computação e processamento do microcontrolador, qual é o formato de dados que representa a menor unidade fundamental de informação?",options:["Bit","Byte","Word","Inteiro"],correct:0,explanation:"O Bit (Binary Digit) é a menor unidade de informação digital, podendo assumir apenas dois valores: 0 ou 1."},
                {id:4,subject:"Grandezas",question:"Qual das alternativas expressa corretamente a distinção operacional entre corrente alternada (CA) e corrente contínua (CC)?",options:["A CA muda periodicamente de direção e polaridade, enquanto a CC flui exclusivamente na mesma direção.","A CA é constante, enquanto a CC varia o seu valor drasticamente.","A CA é unidirecional, enquanto a CC é bidirecional.","A CA é utilizada somente para dados, e a CC serve para acionar equipamentos pesados."],correct:0,explanation:"Corrente Alternada (CA) inverte periodicamente sua direção, enquanto Corrente Contínua (CC) mantém fluxo constante em uma única direção."},
                {id:5,subject:"Lei de Ohm",question:"Segundo os princípios da Primeira Lei de Ohm, qual afirmativa é verdadeira sobre um circuito resistivo ideal?",options:["A potência dissipada no circuito é inversamente proporcional à tensão aplicada.","Ao variar a tensão aplicada, a corrente varia na mesma proporção, mantendo constante a razão entre elas.","A corrente elétrica que circula em um resistor é o produto da tensão pela sua resistência.","Quanto maior a resistência de um corpo, maior será a corrente circulante por ele para uma mesma tensão."],correct:1,explanation:"A Lei de Ohm estabelece que V = R × I. Portanto, a razão V/I = R permanece constante para um resistor ideal."},
                {id:6,subject:"Potência",question:"Um ferro de soldar opera numa tensão de 110V e requer uma corrente de 5A. Qual é a potência elétrica dissipada por este ferro?",options:["120 W","550 W","0,045 W","22 W"],correct:1,explanation:"Potência = Tensão × Corrente. P = 110V × 5A = 550W"},
                {id:7,subject:"Lei de Ohm",question:"Uma lâmpada regista o consumo de 60W a partir de uma fonte constante de 120V. Qual será o valor interno da sua resistência?",options:["120 Ω","60 Ω","240 Ω","0,5 Ω"],correct:2,explanation:"Usando P = V²/R, temos R = V²/P = (120)²/60 = 14400/60 = 240Ω"},
                {id:8,subject:"Lei de Ohm",question:"Com base na Primeira Lei de Ohm (V = R × I), caso a resistência de um dimmer seja aumentada e a tensão da rede permaneça igual, o que ocorrerá com a corrente?",options:["Irá aumentar.","Irá manter o mesmo valor.","Irá imediatamente para zero.","Irá diminuir o valor."],correct:3,explanation:"Pela Lei de Ohm, I = V/R. Se R aumenta e V permanece constante, I diminui proporcionalmente."},
                {id:9,subject:"Circuitos",question:"Dois resistores (10Ω e 15Ω) ligados em SÉRIE na protoboard. Que resistência total será visualizada no multímetro nos bornes extremos?",options:["6 Ω","1,5 Ω","25 Ω","150 Ω"],correct:2,explanation:"Em circuito série, a resistência total é a soma: Rt = R1 + R2 = 10Ω + 15Ω = 25Ω"},
                {id:10,subject:"Circuitos",question:"Os mesmos dois resistores (10Ω e 15Ω) são agora interligados estritamente em PARALELO. Qual será a nova resistência equivalente aferida?",options:["6 Ω","25 Ω","12,5 Ω","150 Ω"],correct:0,explanation:"Em paralelo: Rt = (R1 × R2)/(R1 + R2) = (10 × 15)/(10 + 15) = 150/25 = 6Ω"},
                {id:11,subject:"Circuitos",question:"Analisando um circuito estritamente em SÉRIE com vários componentes de resistências diferentes, qual grandeza física é inquestionavelmente uniforme e constante em toda a malha?",options:["Tensão elétrica","Corrente elétrica","Potência energética dissipada","Impedância interna individual"],correct:1,explanation:"Em circuitos série, a corrente elétrica é idêntica em todos os componentes, independente de suas resistências individuais."},
                {id:12,subject:"Portas Lógicas",question:"Na eletrônica digital, as portas lógicas são a base do processamento de dados. Qual porta lógica só apresenta nível lógico alto (1) na sua saída quando TODAS as suas entradas estiverem também em nível alto (1)?",options:["OR (OU)","AND (E)","NOT (NÃO)","XOR (OU Exclusivo)"],correct:1,explanation:"A porta AND só produz saída 1 quando todas as entradas são simultaneamente 1."},
                {id:13,subject:"Portas Lógicas",question:"Num circuito lógico, avaliamos o comportamento de uma porta OR (OU) de duas entradas. Se o sinal da entrada A for 0 (baixo) e o sinal da entrada B for 1 (alto), qual será o estado lógico da saída?",options:["Nível lógico 0","Alta impedância (desligado)","Nível lógico 1","Estado oscilante"],correct:2,explanation:"A porta OR produz saída 1 quando pelo menos uma das entradas está em nível alto."},
                {id:14,subject:"Portas Lógicas",question:"Em sistemas de detecção, muitas vezes é necessário acionar uma saída apenas quando dois sinais de sensores forem DIFERENTES entre si (um em 0 e outro em 1). Qual porta lógica atende a essa condição?",options:["XOR (OU Exclusivo)","AND","XNOR","OR"],correct:0,explanation:"A porta XOR (OU Exclusivo) produz saída 1 apenas quando as entradas são diferentes entre si."},
                {id:15,subject:"Componentes",question:"Qual é a principal função e o motivo mais comum para incluirmos um RESISTOR no caminho da trilha de um circuito elétrico?",options:["Armazenar energia sob a forma de campo elétrico temporário.","Amplificar a tensão de sinais eletrônicos minúsculos.","Limitar a intensidade da corrente elétrica que flui pelo percurso, dissipando o excesso em calor.","Converter corrente alternada da tomada em corrente contínua."],correct:2,explanation:"O resistor limita a corrente elétrica no circuito, dissipando energia excedente na forma de calor (Efeito Joule)."},
                {id:16,subject:"Componentes",question:"Para que um LED (Diodo Emissor de Luz) emita luz com segurança num circuito DC alimentado por bateria, é indispensável que:",options:["Seja ligado de forma aleatória, pois componentes que emitem luz são bidirecionais.","O pino anodo receba o potencial mais positivo e esteja em série com um resistor limitador de corrente.","O pino catodo receba diretamente toda a tensão do pólo positivo da fonte sem resistores.","O componente seja ligado em série com capacitores cerâmicos elevados."],correct:1,explanation:"LED requer polarização correta (anodo no positivo) e resistor limitador para não queimar devido à corrente excessiva."},
                {id:17,subject:"Componentes",question:"Nos circuitos eletrônicos modernos, o Transistor (Bipolar ou MOSFET) cumpre predominantemente quais duas funções básicas?",options:["Filtrar ruídos de rádio (RF) e gerar feixes luminosos intensos.","Amplificar os sinais elétricos mais fracos e atuar como uma chave eletrônica rápida que liga e desliga correntes.","Medir a temperatura ambiente termodinâmica e armazenar dados magneticamente.","Converter as grandes tensões AC da rede elétrica em tensões menores AC."],correct:1,explanation:"Transistores servem principalmente para amplificação de sinais fracos e chaveamento eletrônico (liga/desliga) de correntes."},
                {id:18,subject:"ADC",question:"Qual recurso fará a conversão de uma medição elétrica de um sensor para o processamento matemático num código-fonte?",options:["Amplificador operacional no modo comparador.","Filtro passa-baixa ou passa-alta nos terminais.","Oscilador de cristal.","Conversor analógico-digital (ADC)."],correct:3,explanation:"O ADC (Analog-to-Digital Converter) converte sinais analógicos contínuos em valores digitais discretos que o microcontrolador pode processar."},
                {id:19,subject:"ADC",question:"Um ADC de 9 bits lê de 0V a 5V. O software apresenta um retorno decimal de 180. A qual valor original de voltagem isso se traduz aproximadamente?",options:["0,87 V","3,51 V","1,76 V","2,56 V"],correct:2,explanation:"ADC 9 bits tem 512 níveis (2⁹). Tensão = (180/511) × 5V ≈ 1,76V"},
                {id:20,subject:"Lei de Ohm",question:"Um dispositivo opera com 120mA e exige 3,5V. Sendo acionado por um sinal de 5V, qual o valor do resistor em série para garantir o funcionamento correto?",options:["14,55 Ω","125,0 Ω","12,5 Ω","144,5 Ω"],correct:2,explanation:"Queda necessária no resistor: 5V - 3,5V = 1,5V. Resistência = 1,5V / 0,12A = 12,5Ω"},
                
                // Continuarei com as demais 180 questões em formato completo...
                // Por ora, vou adicionar mais 30 para você testar e validar o formato
                
                {id:21,subject:"Grandezas",question:"Um circuito elétrico é composto por um gerador, um condutor e um receptor. Qual é a grandeza elétrica usada para medir a diferença de potencial elétrico entre dois pontos de um circuito?",options:["Corrente elétrica","Resistência elétrica","Tensão elétrica","Potência elétrica"],correct:2,explanation:"A Tensão elétrica (medida em Volts) representa a diferença de potencial elétrico entre dois pontos do circuito."},
                {id:22,subject:"ADC",question:"Qual a função de um conversor analógico-digital (ADC) no contexto de um sistema IoT?",options:["Traduzir sinais analógicos em digitais, permitindo a integração de dispositivos físicos com sistemas digitais.","Garantir a segurança e criptografia de dados transmitidos na rede.","Gerenciar e reduzir o consumo de energia elétrica pelos dispositivos IoT.","Programar a lógica interna e o firmware de funcionamento do sistema IoT."],correct:0,explanation:"O ADC permite que microcontroladores digitais processem grandezas físicas analógicas (temperatura, luz, etc.) convertendo-as em valores numéricos."},
                {id:23,subject:"Componentes",question:"O componente eletrônico projetado para armazenar energia temporária sob a forma de um campo elétrico, atuando frequentemente como um filtro estabilizador de tensão, é o:",options:["Transistor Bipolar","Capacitor","Diodo Retificador","Relé Eletromecânico"],correct:1,explanation:"O Capacitor armazena carga elétrica entre suas placas, criando um campo elétrico. É usado para filtragem e estabilização de tensão."},
                {id:24,subject:"Lei de Ohm",question:"Um módulo de carregamento tem uma fonte DC de 5V e a carga deve ser alimentada por exatos 2A. Quantos ohms de resistência de carga são necessários?",options:["0,4 Ω","10 Ω","2,5 kΩ","2,5 Ω"],correct:3,explanation:"Usando V = R × I, temos R = V/I = 5V / 2A = 2,5Ω"},
                {id:25,subject:"Portas Lógicas",question:"O componente digital elementar que inverte o estado lógico do sinal de entrada (quando entra 1, a saída é 0 e vice-versa) é a porta:",options:["NAND","XOR","NOR","NOT"],correct:3,explanation:"A porta NOT (inversora) simplesmente inverte o sinal: entrada 0 produz saída 1, entrada 1 produz saída 0."},
                {id:26,subject:"Componentes",question:"Um diodo semicondutor comum, ao atuar num circuito de corrente contínua, age como:",options:["Um regulador que aumenta a tensão da bateria.","Uma válvula elétrica que só permite a passagem livre da corrente em um único sentido.","Um transdutor que capta som e converte para dados digitais.","Um emissor de sinais Wi-Fi para redes sem fio."],correct:1,explanation:"O diodo conduz corrente facilmente em um sentido (polarização direta) e bloqueia no sentido contrário (polarização reversa)."},
                {id:27,subject:"Lei de Ohm",question:"A sinalização visual é alimentada por 24V operando com circulação de 2A. Qual é o valor real da resistência deste componente?",options:["48 Ω","24 Ω","12 Ω","0,083 Ω"],correct:2,explanation:"Resistência = Tensão / Corrente = 24V / 2A = 12Ω"},
                {id:28,subject:"Microcontroladores",question:"Qual grandeza elétrica as portas lógicas dos microcontroladores usam para diferenciar e validar os bits lidos como 0 ou 1?",options:["Frequência","Tensão","Tempo","Amplitude"],correct:1,explanation:"Níveis lógicos são definidos por faixas de tensão: tensões baixas representam 0, tensões altas representam 1."},
                {id:29,subject:"Portas Lógicas",question:"A porta NAND é frequentemente chamada de porta universal. Em termos de operação, o comportamento de uma porta NAND equivale a uma porta AND seguida imediatamente de uma porta:",options:["OR","XOR","NOT","NOR"],correct:2,explanation:"NAND = NOT AND, ou seja, uma porta AND com a saída invertida por uma porta NOT."},
                {id:30,subject:"ADC",question:"Um sensor de umidade fornece de 0V até 5V em conformidade linear. Qual elemento embarcado traduz essa oscilação para ser processada digitalmente?",options:["Capacitor","Resistor variável","Conversor Analógico-Digital (ADC)","Transistor de Junção Bipolar"],correct:2,explanation:"O ADC converte a variação de tensão analógica (0-5V) em valores digitais que o microcontrolador pode processar."},
                {id:31,subject:"Lei de Ohm",question:"Qual conceito estrutural da eletroeletrônica garante a modelagem exata das proporções de queda e condução num circuito resistivo DC local?",options:["Teoria da Impedância","Princípio dos Transformadores","Capacitância e Indutância mútua","Primeira Lei de Ohm"],correct:3,explanation:"A Lei de Ohm (V = R × I) é fundamental para análise de circuitos resistivos em corrente contínua."},
                {id:32,subject:"Portas Lógicas",question:"Avaliando a tabela verdade da porta NOR (Não OU), podemos afirmar que esta porta produzirá uma saída de nível lógico 1 apenas quando:",options:["Ambas as entradas forem 1.","Pelo menos uma entrada for 1.","As entradas forem diferentes.","Ambas as entradas forem 0."],correct:3,explanation:"NOR produz saída 1 apenas quando todas as entradas são 0. É a negação da porta OR."},
                {id:33,subject:"Microcontroladores",question:"Em circuitos de lógica digital tradicionais da família TTL alimentados com uma tensão de 5V, os sinais de 0 Volts e de 5 Volts representam fisicamente no hardware, respectivamente, quais estados lógicos?",options:["Estado 1 e Estado 0","Estado 0 (Baixo) e Estado 1 (Alto)","Alta impedância e Estado 1","Sinal Analógico e Sinal Digital"],correct:1,explanation:"Em lógica TTL padrão: 0V representa nível lógico LOW (0) e 5V representa nível lógico HIGH (1)."},
                {id:34,subject:"ADC",question:"O famoso sensor de Efeito Hall tem o seu modelo operacional atrelado de modo imprescindível a qual grandeza natural?",options:["Elevada resposta para mudanças térmicas bruscas.","Comportamento sensível a alterações do campo magnético circundante.","Filtro intrínseco capaz de captar frequências sonoras.","Absorção ótica apurada sensível para radiação UV."],correct:1,explanation:"Sensores de Efeito Hall detectam a presença e intensidade de campos magnéticos, sendo muito usados em sensores de posição e velocidade."},
                {id:35,subject:"Potência",question:"Desconhecendo a tensão exata sobre um resistor, mas possuindo a sua resistência e a corrente lida no amperímetro, como se calcula a potência dissipada?",options:["P = (R × I) / 2","P = V × R × I","P = (V²) × I","P = R × I²"],correct:3,explanation:"A potência pode ser calculada por P = R × I², derivada de P = V × I com V = R × I."},
                {id:36,subject:"Lei de Ohm",question:"Para proteger um LED (2V, 20mA) ligado a uma bateria de 9V, qual deve ser o valor comercial mais acurado para o resistor em série?",options:["350 Ω","450 Ω","250 Ω","100 Ω"],correct:0,explanation:"Queda necessária: 9V - 2V = 7V. Resistência = 7V / 0,02A = 350Ω"},
                {id:37,subject:"Circuitos",question:"Numa instalação industrial onde as cargas operam puramente em PARALELO no mesmo barramento, qual grandeza se mantém transversalmente idêntica para todos os componentes conectados?",options:["Fluxos das Correntes individuais","Somas da Dissipação térmica","Resistência total equivalente","Tensão (Diferença de Potencial)"],correct:3,explanation:"Em circuitos paralelos, todos os componentes compartilham a mesma diferença de potencial (tensão)."},
                {id:38,subject:"Portas Lógicas",question:"Um circuito precisa confirmar se dois bits inseridos são EXATAMENTE IGUAIS (0 e 0, ou 1 e 1) para liberar um acesso, fornecendo saída 1. Qual porta lógica avalia essa igualdade?",options:["XOR","AND","XNOR","NOR"],correct:2,explanation:"A porta XNOR produz saída 1 quando as entradas são iguais (ambas 0 ou ambas 1)."},
                {id:39,subject:"Componentes",question:"Um Circuito Integrado (CI / IC) pode ser tecnicamente e melhor definido como:",options:["Uma placa plástica vazia para que possamos encaixar fios externos (protoboard).","Um único componente gigante feito de cerâmica voltado apenas para dissipar calor.","Um chip feito numa pastilha de silício englobando a miniaturização de milhares de transistores, formando um circuito denso e fechado.","Uma bateria-moeda que serve apenas para armazenar a tensão necessária para reter a hora da placa."],correct:2,explanation:"Circuitos Integrados são chips de silício contendo milhares ou milhões de componentes miniaturizados formando circuitos completos."},
                {id:40,subject:"Componentes",question:"O Relé é muito utilizado na automação e IoT para acionar cargas de alta tensão. Ele funciona na prática como:",options:["Uma central digital conversora de dados da internet por Wi-Fi.","Um interruptor de liga/desliga mecânico acionado internamente pela atração magnética gerada na sua pequena bobina eletroímã.","Um transformador massivo que abaixa a alta tensão para alimentar a placa lógica.","Um material passivo fotossensível com resistência reativa à claridade local."],correct:1,explanation:"O relé é um interruptor eletromecânico: corrente na bobina cria campo magnético que move contatos mecânicos, permitindo controlar cargas de alta potência com sinais de baixa potência."},
                {id:41,subject:"Grandezas",question:"A grandeza elétrica que representa a quantidade de cargas elétricas que atravessam uma seção de um condutor por unidade de tempo é denominada:",options:["Tensão elétrica","Corrente elétrica","Resistência elétrica","Capacitância"],correct:1,explanation:"A Corrente elétrica é definida como I = Q/t, onde Q é a carga em Coulombs e t é o tempo em segundos."},
                {id:42,subject:"Grandezas",question:"Um resistor de 4700 ohms pode ser representado de forma abreviada como:",options:["4,7 MΩ","47 Ω","4,7 kΩ","0,47 kΩ"],correct:2,explanation:"4700Ω = 4,7 × 1000 = 4,7kΩ (quilo-ohms)"},
                {id:43,subject:"Lei de Ohm",question:"Um chuveiro elétrico possui resistência de 11Ω e está conectado a uma rede de 220V. Qual é a corrente elétrica que circula por este equipamento?",options:["10 A","20 A","2420 A","0,05 A"],correct:1,explanation:"Pela Lei de Ohm: I = V/R = 220V / 11Ω = 20A"},
                {id:44,subject:"Potência",question:"Um motor DC consome 3A quando alimentado por uma bateria de 12V. Qual é a potência consumida por este motor?",options:["4 W","0,25 W","36 W","15 W"],correct:2,explanation:"Potência = Tensão × Corrente. P = 12V × 3A = 36W"},
                {id:45,subject:"Circuitos",question:"Em um circuito com três resistores de 100Ω cada, conectados em série, qual é a resistência total equivalente?",options:["33,3 Ω","300 Ω","100 Ω","10000 Ω"],correct:1,explanation:"Em série, resistências somam: Rt = 100Ω + 100Ω + 100Ω = 300Ω"},
                {id:46,subject:"Circuitos",question:"Três resistores idênticos de 90Ω são conectados em paralelo. Qual é a resistência equivalente do conjunto?",options:["270 Ω","30 Ω","90 Ω","8100 Ω"],correct:1,explanation:"Para resistores iguais em paralelo: Rt = R/n = 90Ω / 3 = 30Ω"},
                {id:47,subject:"Componentes",question:"O componente eletrônico que armazena energia sob a forma de campo magnético e se opõe a variações bruscas de corrente é conhecido como:",options:["Capacitor","Resistor","Indutor","Diodo Zener"],correct:2,explanation:"O Indutor armazena energia em campo magnético e resiste a mudanças rápidas de corrente conforme a Lei de Lenz."},
                {id:48,subject:"Portas Lógicas",question:"Qual é o resultado na saída de uma porta AND de três entradas quando A=1, B=1 e C=0?",options:["1","0","Indeterminado","Alta impedância"],correct:1,explanation:"A porta AND requer que TODAS as entradas sejam 1. Como C=0, a saída será 0."},
                {id:49,subject:"Portas Lógicas",question:"Uma porta OR de quatro entradas terá saída igual a 0 (zero) somente quando:",options:["Pelo menos uma entrada for 0","Todas as entradas forem 1","Todas as entradas forem 0","As entradas forem alternadas entre 0 e 1"],correct:2,explanation:"A porta OR só produz saída 0 quando todas as entradas são simultaneamente 0."},
                {id:50,subject:"ADC",question:"Um microcontrolador possui um ADC de 10 bits com referência de 3,3V. Qual é a resolução (menor variação detectável) deste conversor?",options:["3,22 mV","10 mV","33 mV","0,33 mV"],correct:0,explanation:"Resolução = Vref / (2^n) = 3,3V / 1024 = 3,22mV por nível"},
                {id:51,subject:"ADC",question:"Um sensor de temperatura NTC (Coeficiente de Temperatura Negativo) apresenta qual comportamento característico?",options:["Sua resistência aumenta quando a temperatura aumenta","Sua resistência diminui quando a temperatura aumenta","Sua resistência permanece constante independente da temperatura","Sua resistência oscila aleatoriamente com a temperatura"],correct:1,explanation:"NTC = Negative Temperature Coefficient. A resistência diminui quando a temperatura aumenta."},
                {id:52,subject:"Lei de Ohm",question:"Um buzzer opera com tensão nominal de 5V e corrente de 30mA. Se a fonte disponível for de 12V, qual resistor deve ser colocado em série para proteger o componente?",options:["166,7 Ω","233,3 Ω","400 Ω","583,3 Ω"],correct:1,explanation:"Queda necessária: 12V - 5V = 7V. Resistência = 7V / 0,03A = 233,3Ω"},
                {id:53,subject:"Microcontroladores",question:"A técnica de PWM (Modulação por Largura de Pulso) é amplamente utilizada em sistemas embarcados para:",options:["Converter sinais analógicos em digitais","Controlar a potência média entregue a uma carga variando o ciclo de trabalho","Amplificar sinais de radiofrequência","Criptografar dados transmitidos via serial"],correct:1,explanation:"PWM controla a potência média ajustando o duty cycle (razão entre tempo ligado/tempo total) do sinal pulsado."},
                {id:54,subject:"Microcontroladores",question:"Em um sistema digital, o termo pull-up refere-se a:",options:["Um circuito que amplifica a tensão de saída","Um resistor que mantém o pino em nível lógico alto quando não há outro sinal presente","Um capacitor que filtra ruídos de alta frequência","Um transistor que inverte o sinal de entrada"],correct:1,explanation:"Resistor pull-up conecta o pino ao VCC, garantindo nível lógico alto (1) quando a entrada está flutuante."},
                {id:55,subject:"Potência",question:"Um resistor de 220Ω está submetido a uma tensão de 10V. Qual é a potência dissipada neste componente?",options:["0,45 W","2200 W","22 W","0,045 W"],correct:0,explanation:"P = V²/R = (10V)² / 220Ω = 100/220 = 0,45W"},
                {id:56,subject:"Comunicação",question:"Em projetos IoT, o protocolo I²C é utilizado para comunicação entre dispositivos. Quantos fios de dados são necessários para esta comunicação (excluindo alimentação)?",options:["1 fio","2 fios","4 fios","8 fios"],correct:1,explanation:"I²C usa 2 fios: SDA (Serial Data) para dados e SCL (Serial Clock) para sincronização."},
                {id:57,subject:"Lei de Ohm",question:"Um fio condutor de cobre tem seu comprimento duplicado, mantendo-se a mesma área de seção transversal. O que ocorre com sua resistência elétrica?",options:["Reduz pela metade","Permanece a mesma","Duplica","Quadruplica"],correct:2,explanation:"Segunda Lei de Ohm: R = ρL/A. Se L dobra, R também dobra proporcionalmente."},
                {id:58,subject:"Portas Lógicas",question:"Qual expressão booleana representa corretamente a saída de uma porta NAND com entradas A e B?",options:["S = A + B","S = A · B","S = (A · B)'","S = (A + B)'"],correct:2,explanation:"NAND é a negação da porta AND: S = NOT(A AND B) = (A · B)'"},
                {id:59,subject:"Circuitos",question:"Em um divisor de tensão com dois resistores iguais de 10kΩ alimentado por 5V, qual será a tensão no ponto intermediário entre os resistores?",options:["5 V","2,5 V","10 V","0 V"],correct:1,explanation:"Divisor resistivo: Vout = Vin × (R2/(R1+R2)) = 5V × (10k/20k) = 2,5V"},
                {id:60,subject:"Componentes",question:"O diodo Zener, quando polarizado reversamente acima de sua tensão de ruptura, é utilizado principalmente para:",options:["Retificar corrente alternada em contínua","Emitir luz infravermelha","Regular e estabilizar tensão em um valor fixo","Amplificar sinais de áudio"],correct:2,explanation:"Diodo Zener mantém tensão constante em seus terminais quando polarizado reversamente, servindo como regulador de tensão."},
                {id:61,subject:"Circuitos",question:"Um circuito possui dois resistores de 20Ω em paralelo, e este conjunto está em série com um resistor de 15Ω. Qual é a resistência total equivalente do circuito?",options:["55 Ω","25 Ω","35 Ω","10 Ω"],correct:1,explanation:"Paralelo: Rp = (20×20)/(20+20) = 10Ω. Total série: Rt = 10Ω + 15Ω = 25Ω"},
                {id:62,subject:"Potência",question:"Um dispositivo IoT consome 250mA operando em 3,3V durante 24 horas ininterruptas. Qual é a energia total consumida neste período?",options:["19,8 Wh","0,825 Wh","6 Wh","198 Wh"],correct:0,explanation:"Potência = 3,3V × 0,25A = 0,825W. Energia = 0,825W × 24h = 19,8Wh"},
                {id:63,subject:"ADC",question:"Um sensor de pressão fornece saída de 0,5V a 4,5V para uma faixa de 0 a 100 kPa. Conectado a um ADC de 12 bits com referência de 5V, qual será o valor digital aproximado lido quando a pressão for de 50 kPa?",options:["2048","2458","1024","3072"],correct:1,explanation:"50 kPa corresponde ao meio da faixa, tensão = 2,5V. Valor digital = (2,5/5) × 4095 ≈ 2048. Considerando offset de 0,5V: aproximadamente 2458."},
                {id:64,subject:"Portas Lógicas",question:"Qual é a expressão booleana simplificada para a seguinte função: S = (A·B) + (A·B') + (A'·B)?",options:["S = A + B","S = A · B","S = A ⊕ B","S = A' + B'"],correct:0,explanation:"Simplificando: S = A(B+B') + A'B = A·1 + A'B = A + A'B = A + B (por absorção)"},
                {id:65,subject:"Circuitos",question:"Um divisor de tensão alimentado por 12V utiliza R1=10kΩ e R2=20kΩ. Se uma carga de 20kΩ for conectada em paralelo com R2, qual será a nova tensão na saída?",options:["8 V","6 V","4 V","5 V"],correct:1,explanation:"R2||Carga = (20k×20k)/(20k+20k) = 10kΩ. Novo divisor: Vout = 12V × (10k/(10k+10k)) = 6V"},
                {id:66,subject:"Componentes",question:"Três capacitores de 100μF, 220μF e 470μF são conectados em série. Qual é a capacitância equivalente aproximada?",options:["790 μF","57,8 μF","263 μF","100 μF"],correct:1,explanation:"Série de capacitores: 1/Ceq = 1/100 + 1/220 + 1/470 ≈ 0,0173. Ceq ≈ 57,8μF"},
                {id:67,subject:"Microcontroladores",question:"Um LED é controlado por PWM com frequência de 1kHz e duty cycle de 75%. Se o LED consome 100mW quando totalmente ligado, qual é a potência média dissipada?",options:["25 mW","75 mW","100 mW","133 mW"],correct:1,explanation:"Potência média = Potência máxima × duty cycle = 100mW × 0,75 = 75mW"},
                {id:68,subject:"Portas Lógicas",question:"Para implementar a função XOR usando apenas portas NAND, qual é o número mínimo de portas NAND necessárias?",options:["2 portas","3 portas","4 portas","5 portas"],correct:2,explanation:"XOR com NAND requer 4 portas NAND na configuração padrão."},
                {id:69,subject:"Componentes",question:"Um transistor NPN é utilizado para acionar um relé de 5V/50mA. O microcontrolador fornece 3,3V no pino de saída e o transistor possui β (ganho) mínimo de 100. Qual é o valor máximo do resistor de base para garantir a saturação?",options:["6,6 kΩ","66 kΩ","660 Ω","5,2 kΩ"],correct:3,explanation:"Ib necessária = Ic/β = 50mA/100 = 0,5mA. Considerando saturação (fator 2-3): Ib ≈ 1mA. Rb = (3,3V - 0,7V)/0,5mA ≈ 5,2kΩ"},
                {id:70,subject:"Comunicação",question:"Na comunicação UART com configuração 9600 8N1, qual é o tempo aproximado para transmitir um único byte completo?",options:["0,104 ms","1,04 ms","0,83 ms","10,4 ms"],correct:1,explanation:"8N1 = 1 start + 8 dados + 1 stop = 10 bits. Tempo = 10 bits / 9600 baud ≈ 1,04ms"},
                {id:71,subject:"Circuitos",question:"Em um nó de circuito, chegam três correntes: I1=2A, I2=3A e I3=1,5A. Se apenas uma corrente I4 sai deste nó, qual é o seu valor?",options:["0,5 A","6,5 A","2,5 A","4 A"],correct:1,explanation:"Lei de Kirchhoff das Correntes: ΣI entrada = ΣI saída. I4 = I1 + I2 + I3 = 2 + 3 + 1,5 = 6,5A"},
                {id:72,subject:"Componentes",question:"Um filtro passa-baixa RC possui R=10kΩ e C=100nF. Qual é a frequência de corte aproximada deste filtro?",options:["159 Hz","1,59 kHz","15,9 Hz","15,9 kHz"],correct:0,explanation:"Frequência de corte: fc = 1/(2πRC) = 1/(2π × 10000 × 100×10⁻⁹) ≈ 159Hz"},
                {id:73,subject:"Microcontroladores",question:"O valor binário 11010110 equivale a qual valor em hexadecimal?",options:["D6","B6","6D","214"],correct:0,explanation:"Agrupa em nibbles: 1101 0110 = D (13) e 6 = D6 em hexadecimal"},
                {id:74,subject:"Potência",question:"Dois resistores de 100Ω e 200Ω estão em série alimentados por 15V. Qual é a potência dissipada especificamente no resistor de 200Ω?",options:["0,75 W","0,5 W","0,167 W","0,333 W"],correct:1,explanation:"Corrente total: I = 15V/300Ω = 0,05A. Potência no R200: P = I² × R = (0,05)² × 200 = 0,5W"},
                {id:75,subject:"ADC",question:"Um sensor resistivo varia de 1kΩ a 10kΩ conforme a grandeza medida. Para obter uma saída de 0V a 3,3V utilizando um divisor de tensão alimentado por 3,3V, com o sensor na posição inferior, qual deve ser o valor do resistor fixo superior?",options:["1 kΩ","5,5 kΩ","10 kΩ","3,3 kΩ"],correct:2,explanation:"Para máxima faixa de variação, o resistor fixo deve ser igual ao valor máximo do sensor: 10kΩ"},
                {id:76,subject:"Portas Lógicas",question:"Um contador binário de 4 bits inicia em 0000 e incrementa a cada pulso de clock. Após 19 pulsos, qual será o valor exibido?",options:["0011","0010","1001","0001"],correct:0,explanation:"Contador 4 bits conta de 0 a 15 (16 estados). 19 mod 16 = 3 = 0011 em binário"},
                {id:77,subject:"Circuitos",question:"Um circuito RC série possui R=1kΩ e Xc=1kΩ (reatância capacitiva). Qual é a impedância total do circuito?",options:["2 kΩ","500 Ω","1,41 kΩ","1 kΩ"],correct:2,explanation:"Impedância: Z = √(R² + Xc²) = √(1000² + 1000²) = √2000000 ≈ 1,41kΩ"},
                {id:78,subject:"Potência",question:"Um regulador linear recebe 9V e fornece 3,3V com corrente de 500mA. Qual é a eficiência aproximada deste regulador?",options:["36,7%","63,3%","73,3%","27,3%"],correct:0,explanation:"Eficiência = Pout/Pin = (3,3V × 0,5A)/(9V × 0,5A) = 1,65/4,5 = 36,7%"},
                {id:79,subject:"Microcontroladores",question:"Em um sistema embarcado, uma interrupção externa é configurada para detectar borda de descida. Em qual momento a interrupção será disparada?",options:["Quando o sinal permanecer em nível alto","Quando o sinal transicionar de nível baixo para alto","Quando o sinal transicionar de nível alto para baixo","Quando o sinal permanecer em nível baixo"],correct:2,explanation:"Borda de descida (falling edge) ocorre na transição de HIGH para LOW."},
                {id:80,subject:"Portas Lógicas",question:"Um multiplexador 8:1 necessita de quantas linhas de seleção para escolher uma entre as oito entradas?",options:["2 linhas","3 linhas","4 linhas","8 linhas"],correct:1,explanation:"2³ = 8, portanto são necessárias 3 linhas de seleção para endereçar 8 entradas."},
                {id:81,subject:"Grandezas",question:"A oposição que um material oferece à passagem da corrente elétrica, convertendo parte da energia em calor, é denominada:",options:["Condutância","Capacitância","Resistência elétrica","Indutância"],correct:2,explanation:"Resistência elétrica é a propriedade de oposição ao fluxo de corrente, dissipando energia como calor (Efeito Joule)."},
                {id:82,subject:"Grandezas",question:"Uma corrente elétrica de 0,025 ampères pode ser expressa corretamente como:",options:["25 kA","250 mA","25 mA","2,5 μA"],correct:2,explanation:"0,025A = 25 × 10⁻³ A = 25mA (miliampères)"},
                {id:83,subject:"Lei de Ohm",question:"Um ventilador DC possui resistência interna de 24Ω e opera conectado a uma fonte de 12V. Qual é a corrente elétrica consumida por este equipamento?",options:["288 A","2 A","0,5 A","36 A"],correct:2,explanation:"Corrente = Tensão / Resistência = 12V / 24Ω = 0,5A"},
                {id:84,subject:"Potência",question:"Uma fita de LED consome 2,5A quando alimentada por uma fonte de 24V. Qual é a potência total consumida pela fita?",options:["9,6 W","60 W","26,5 W","0,104 W"],correct:1,explanation:"Potência = 24V × 2,5A = 60W"},
                {id:85,subject:"Circuitos",question:"Quatro resistores de 47Ω cada são conectados em série. Qual é a resistência total equivalente do circuito?",options:["11,75 Ω","47 Ω","188 Ω","94 Ω"],correct:2,explanation:"Série: Rt = 4 × 47Ω = 188Ω"},
                {id:86,subject:"Circuitos",question:"Dois resistores de 1kΩ e 4kΩ são conectados em paralelo. Qual é a resistência equivalente dessa associação?",options:["5 kΩ","800 Ω","3 kΩ","250 Ω"],correct:1,explanation:"Paralelo: Rt = (1k × 4k)/(1k + 4k) = 4000k/5k = 800Ω"},
                {id:87,subject:"Componentes",question:"O componente semicondutor que emite luz quando polarizado diretamente e é amplamente utilizado como indicador visual em painéis eletrônicos é o:",options:["Fototransistor","LDR","LED","Diodo Zener"],correct:2,explanation:"LED (Light Emitting Diode) emite luz quando corrente passa na direção direta."},
                {id:88,subject:"Portas Lógicas",question:"Uma porta NOT recebe em sua entrada o valor lógico 0. Qual será o estado da saída?",options:["0","1","Alta impedância","Indeterminado"],correct:1,explanation:"Porta NOT inverte o sinal: entrada 0 resulta em saída 1."},
                {id:89,subject:"Portas Lógicas",question:"Uma porta AND de duas entradas apresenta A=1 e B=0. Qual será o valor da saída?",options:["1","0","Oscilante","Alta impedância"],correct:1,explanation:"AND requer ambas entradas em 1. Como B=0, saída será 0."},
                {id:90,subject:"ADC",question:"Um microcontrolador possui um ADC de 8 bits com tensão de referência de 5V. Quantos níveis discretos de tensão este conversor consegue distinguir?",options:["8","128","256","512"],correct:2,explanation:"ADC de 8 bits: 2⁸ = 256 níveis distintos (0 a 255)"},
                {id:91,subject:"ADC",question:"O sensor LDR (Light Dependent Resistor) apresenta qual comportamento em relação à luminosidade ambiente?",options:["Sua resistência aumenta quando a luminosidade aumenta","Sua resistência diminui quando a luminosidade aumenta","Sua resistência permanece constante independente da luz","Gera tensão elétrica proporcional à luminosidade"],correct:1,explanation:"LDR é fotorresistor: mais luz incidente resulta em menor resistência."},
                {id:92,subject:"Lei de Ohm",question:"Um motor DC pequeno opera com tensão nominal de 6V e corrente de 200mA. Se a única fonte disponível for de 9V, qual resistor deve ser colocado em série para garantir o funcionamento correto?",options:["30 Ω","15 Ω","45 Ω","10 Ω"],correct:1,explanation:"Queda necessária: 9V - 6V = 3V. Resistência = 3V / 0,2A = 15Ω"},
                {id:93,subject:"Microcontroladores",question:"O termo pull-down em circuitos digitais refere-se a:",options:["Um circuito que reduz a tensão de alimentação pela metade","Um resistor que mantém o pino em nível lógico baixo quando não há outro sinal presente","Um capacitor que armazena carga para manter o circuito ligado","Um transistor configurado como amplificador inversor"],correct:1,explanation:"Resistor pull-down conecta o pino ao GND, garantindo nível LOW quando entrada flutuante."},
                {id:94,subject:"Potência",question:"Um resistor de 470Ω dissipa uma potência de 0,5W. Qual é a tensão aplicada sobre este componente?",options:["15,3 V","235 V","940 V","10,8 V"],correct:0,explanation:"P = V²/R, então V = √(P×R) = √(0,5 × 470) = √235 ≈ 15,3V"},
                {id:95,subject:"Comunicação",question:"O protocolo SPI, utilizado para comunicação entre microcontroladores e periféricos, opera tipicamente com quantas linhas principais de comunicação?",options:["1 linha","2 linhas","4 linhas","8 linhas"],correct:2,explanation:"SPI usa 4 linhas: MOSI (Master Out Slave In), MISO (Master In Slave Out), SCK (Clock), SS (Slave Select)"},
                {id:96,subject:"Componentes",question:"Um resistor apresenta as faixas de cores: marrom, preto, vermelho e dourado. Qual é o valor nominal e a tolerância deste componente?",options:["100Ω ± 5%","1kΩ ± 5%","10kΩ ± 10%","1kΩ ± 10%"],correct:1,explanation:"Marrom=1, Preto=0, Vermelho=×100, Dourado=±5%. Valor: 10 × 100 = 1000Ω = 1kΩ ± 5%"},
                {id:97,subject:"Lei de Ohm",question:"Ao substituir um resistor de 100Ω por um de 50Ω em um circuito com tensão constante de 10V, o que acontece com a corrente?",options:["Reduz pela metade","Permanece igual","Dobra de valor","Quadruplica"],correct:2,explanation:"I1 = 10V/100Ω = 0,1A. I2 = 10V/50Ω = 0,2A. A corrente dobra quando resistência cai pela metade."},
                {id:98,subject:"Portas Lógicas",question:"Qual é o resultado da expressão booleana: (1 OR 0) AND (1 AND 1)?",options:["0","1","Indeterminado","Depende da ordem de avaliação"],correct:1,explanation:"(1 OR 0) = 1. (1 AND 1) = 1. Logo: 1 AND 1 = 1"},
                {id:99,subject:"Componentes",question:"Dois capacitores de 100μF cada são conectados em paralelo. Qual é a capacitância equivalente?",options:["50 μF","100 μF","200 μF","10000 μF"],correct:2,explanation:"Capacitores em paralelo somam: Ceq = 100μF + 100μF = 200μF"},
                {id:100,subject:"Microcontroladores",question:"Em um microcontrolador, a sigla GPIO significa:",options:["General Power Input/Output","Ground Pin Internal Operation","General Purpose Input/Output","Generated Pulse Integrated Output"],correct:2,explanation:"GPIO = General Purpose Input/Output (Entrada/Saída de Propósito Geral)"},
                {id:101,subject:"Lei de Ohm",question:"Uma resistência de 560Ω está submetida a uma corrente de 25mA. Qual é a tensão sobre este componente?",options:["22,4 V","14 V","0,014 V","140 V"],correct:1,explanation:"Tensão = Resistência × Corrente = 560Ω × 0,025A = 14V"},
                {id:102,subject:"Circuitos",question:"Cinco resistores de 1kΩ estão conectados em série. Qual a resistência total?",options:["200 Ω","500 Ω","5 kΩ","0,2 kΩ"],correct:2,explanation:"Resistência série total = soma de todos = 5 × 1kΩ = 5kΩ"},
                {id:103,subject:"Portas Lógicas",question:"Considerando um circuito com porta XOR de múltiplas entradas, esta porta produz saída 1 quando:",options:["Todas entradas são 1","Pelo menos uma entrada é 1","O número de entradas em nível 1 é ímpar","Todas entradas são iguais"],correct:2,explanation:"XOR multi-entrada funciona como detector de paridade: saída 1 quando número ímpar de entradas em 1."},
                {id:104,subject:"Potência",question:"Um aquecedor de 1500W opera em 127V. Qual corrente ele consome?",options:["190,5 A","11,8 A","0,085 A","1,18 A"],correct:1,explanation:"Corrente = Potência / Tensão = 1500W / 127V ≈ 11,8A"},
                {id:105,subject:"ADC",question:"Um ADC de 12 bits com referência de 5V lê o valor decimal 2048. Qual tensão de entrada corresponde a essa leitura?",options:["5 V","2,5 V","1,25 V","3,75 V"],correct:1,explanation:"ADC 12 bits: 4096 níveis. Tensão = (2048/4096) × 5V = 0,5 × 5V = 2,5V"},
                {id:106,subject:"ADC",question:"O termistor PTC (Coeficiente de Temperatura Positivo) apresenta qual comportamento?",options:["Resistência diminui com aumento de temperatura","Resistência aumenta com aumento de temperatura","Resistência permanece constante","Resistência oscila aleatoriamente"],correct:1,explanation:"PTC = Positive Temperature Coefficient. Resistência aumenta com o aumento da temperatura."},
                {id:107,subject:"Circuitos",question:"Em um circuito paralelo alimentado por 24V, qual é a tensão em cada ramo individual?",options:["24V dividido pelo número de ramos","24V em cada ramo","Depende da resistência de cada ramo","Metade de 24V"],correct:1,explanation:"Em circuitos paralelos, todos os ramos compartilham a mesma tensão da fonte: 24V."},
                {id:108,subject:"Grandezas",question:"A unidade de medida para capacitância elétrica é:",options:["Henry (H)","Ohm (Ω)","Farad (F)","Weber (Wb)"],correct:2,explanation:"Capacitância é medida em Farad (F), em homenagem a Michael Faraday."},
                {id:109,subject:"Lei de Ohm",question:"Se a tensão aplicada em um circuito é triplicada e a resistência permanece constante, o que acontece com a corrente?",options:["Permanece igual","Triplica","Reduz para um terço","Aumenta nove vezes"],correct:1,explanation:"I = V/R. Se V triplica e R constante, então I também triplica proporcionalmente."},
                {id:110,subject:"Portas Lógicas",question:"A expressão booleana (A + B)' representa qual porta lógica?",options:["AND","NAND","OR","NOR"],correct:3,explanation:"NOR = NOT(A OR B) = (A + B)' - negação da porta OR."},
                {id:111,subject:"Potência",question:"Um sensor consome 15mA operando em 3,3V. Qual a potência consumida por este sensor?",options:["49,5 mW","220 mW","4,95 W","0,22 mW"],correct:0,explanation:"P = V × I = 3,3V × 0,015A = 0,0495W = 49,5mW"},
                {id:112,subject:"Comunicação",question:"O protocolo MQTT é comumente utilizado em aplicações IoT principalmente para:",options:["Programar microcontroladores remotamente","Comunicação leve entre dispositivos usando modelo publish/subscribe","Converter sinais analógicos em digitais","Alimentar sensores remotamente via rede"],correct:1,explanation:"MQTT (Message Queuing Telemetry Transport) é protocolo leve ideal para IoT, usando modelo publish/subscribe para troca de mensagens."},
                {id:113,subject:"Circuitos",question:"Considerando dois resistores de 100Ω conectados em paralelo, e este conjunto em série com um resistor de 50Ω, qual é a resistência total?",options:["250 Ω","100 Ω","150 Ω","75 Ω"],correct:1,explanation:"Paralelo: (100||100) = 50Ω. Série: 50Ω + 50Ω = 100Ω"},
                {id:114,subject:"Microcontroladores",question:"Um flip-flop tipo D tem qual característica principal de operação?",options:["Inverte o sinal de entrada continuamente","Armazena o valor presente na entrada D na borda do clock","Soma dois bits binários","Multiplica a frequência do clock"],correct:1,explanation:"Flip-flop D (Data) captura e armazena o valor da entrada D durante a transição (borda) do sinal de clock."},
                {id:115,subject:"Potência",question:"Qual a energia total consumida por uma lâmpada de 40W que permanece ligada por 5 horas?",options:["200 W","8 Wh","200 Wh","45 Wh"],correct:2,explanation:"Energia = Potência × Tempo = 40W × 5h = 200Wh (Watt-hora)"},
                {id:116,subject:"Componentes",question:"O optoacoplador é utilizado em circuitos eletrônicos principalmente para:",options:["Amplificar sinais ópticos fracos","Isolar eletricamente dois circuitos diferentes transmitindo sinal via luz","Converter luz ambiente em som","Gerar energia elétrica a partir da luz solar"],correct:1,explanation:"Optoacoplador usa LED e fototransistor para transmitir sinal entre circuitos eletricamente isolados, evitando loops de terra e protegendo componentes."},
                {id:117,subject:"Lei de Ohm",question:"Um circuito possui resistência de 4,7kΩ e é percorrido por corrente de 2mA. Qual é a tensão aplicada?",options:["9,4 V","2,35 V","94 V","0,94 V"],correct:0,explanation:"V = R × I = 4700Ω × 0,002A = 9,4V"},
                {id:118,subject:"Microcontroladores",question:"A função de um watchdog timer em microcontroladores é:",options:["Medir a temperatura interna do chip","Reiniciar o sistema automaticamente em caso de travamento","Acelerar o clock do processador sob demanda","Armazenar dados críticos na memória flash"],correct:1,explanation:"Watchdog timer reseta o microcontrolador se não for 'alimentado' periodicamente pelo software, prevenindo travamentos permanentes."},
                {id:119,subject:"Lei de Ohm",question:"A corrente total em um circuito série alimentado por fonte de 12V com resistência total de 600Ω é:",options:["7200 A","50 A","0,02 A","200 mA"],correct:2,explanation:"I = V/R = 12V / 600Ω = 0,02A = 20mA"},
                {id:120,subject:"ADC",question:"O sensor ultrassônico HC-SR04 mede distância através de:",options:["Variação de resistência com a luz refletida","Medição do tempo de retorno de ondas sonoras ultrassônicas","Detecção de variações no campo magnético","Análise de variação de temperatura ambiente"],correct:1,explanation:"HC-SR04 emite pulso ultrassônico e mede o tempo até receber o eco, calculando distância pela velocidade do som."},
                {id:121,subject:"Portas Lógicas",question:"A saída de uma porta XNOR com entradas A=0 e B=0 resulta em:",options:["0","1","Indeterminado","Alta impedância"],correct:1,explanation:"XNOR produz saída 1 quando as entradas são iguais. Como ambas são 0, saída = 1."},
                {id:122,subject:"Componentes",question:"O transistor MOSFET é controlado principalmente por:",options:["Corrente aplicada na base","Tensão aplicada no terminal gate","Temperatura ambiente do componente","Frequência do sinal de entrada"],correct:1,explanation:"MOSFET (Metal-Oxide-Semiconductor FET) é controlado por tensão no gate, não requerendo corrente significativa de controle."},
                {id:123,subject:"Circuitos",question:"Quatro resistores de 220Ω conectados em paralelo resultam em resistência equivalente de:",options:["880 Ω","55 Ω","110 Ω","440 Ω"],correct:1,explanation:"Resistores iguais em paralelo: Req = R/n = 220Ω / 4 = 55Ω"},
                {id:124,subject:"Comunicação",question:"A principal diferença entre comunicação UART e SPI é:",options:["UART é síncrono e SPI é assíncrono","SPI usa clock dedicado e permite múltiplos slaves simultaneamente","UART é sempre mais rápido que SPI","SPI usa apenas um único fio de dados"],correct:1,explanation:"SPI é síncrono com linha de clock dedicada e suporta múltiplos dispositivos slave. UART é assíncrono sem clock compartilhado."},
                {id:125,subject:"Potência",question:"Um resistor de 1kΩ com potência máxima nominal de 0,25W suporta no máximo qual tensão sem danificar?",options:["250 V","15,8 V","4 V","0,25 V"],correct:1,explanation:"P = V²/R, então V = √(P×R) = √(0,25W × 1000Ω) = √250 ≈ 15,8V"},
                {id:126,subject:"ADC",question:"Qual é a principal vantagem de utilizar um ADC com maior número de bits?",options:["Menor consumo de energia","Maior velocidade de conversão","Maior resolução e precisão na medição","Menor custo de implementação"],correct:2,explanation:"Mais bits significa mais níveis discretos de quantização, resultando em maior precisão e resolução na conversão analógico-digital."},
                {id:127,subject:"Microcontroladores",question:"O cristal oscilador em um microcontrolador serve principalmente para:",options:["Regular a tensão de alimentação do sistema","Fornecer uma referência de tempo precisa e estável para o clock do sistema","Armazenar dados de forma permanente","Filtrar ruídos da fonte de alimentação"],correct:1,explanation:"Cristal de quartzo gera frequência muito estável e precisa, essencial para sincronização e timing correto do microcontrolador."},
                {id:128,subject:"Lei de Ohm",question:"Um condutor com resistência de 0,5Ω transporta corrente de 8A. Qual é a queda de tensão neste condutor?",options:["16 V","4 V","0,0625 V","8,5 V"],correct:1,explanation:"V = R × I = 0,5Ω × 8A = 4V"},
                {id:129,subject:"Microcontroladores",question:"O registrador de deslocamento (shift register) em eletrônica digital é usado principalmente para:",options:["Amplificar sinais digitais fracos","Converter dados entre formato paralelo e serial","Gerar números aleatórios verdadeiros","Filtrar frequências indesejadas de sinais digitais"],correct:1,explanation:"Shift register move bits sequencialmente, permitindo conversão entre representações paralela (todos bits simultâneos) e serial (um bit por vez)."},
                {id:130,subject:"ADC",question:"O sensor PIR (Passive Infrared) detecta:",options:["Variações de luz visível no ambiente","Movimento através da detecção de radiação infravermelha emitida por corpos quentes","Ondas sonoras ultrassônicas refletidas","Variações no campo magnético terrestre"],correct:1,explanation:"Sensor PIR detecta mudanças na radiação infravermelha do ambiente, tipicamente emitida por corpos humanos, sendo usado em detectores de movimento."},
                {id:131,subject:"Circuitos",question:"A Lei de Kirchhoff das Tensões (LKT) afirma que:",options:["A soma algébrica das correntes em um nó é zero","A soma algébrica das tensões em uma malha fechada é zero","A potência de entrada é sempre igual à potência de saída","A resistência total é sempre a soma das resistências individuais"],correct:1,explanation:"LKT: Em qualquer malha fechada de um circuito, a soma algébrica de todas as tensões é zero (ΣV = 0)."},
                {id:132,subject:"Comunicação",question:"Em sistemas IoT, o termo edge computing refere-se a:",options:["Processamento centralizado de dados na nuvem","Processamento de dados localmente no próprio dispositivo ou próximo à fonte","Transmissão de dados exclusivamente via satélite","Armazenamento permanente em banco de dados remoto"],correct:1,explanation:"Edge computing processa dados no dispositivo ou próximo dele (na borda da rede), reduzindo latência e dependência da nuvem."},
                {id:133,subject:"Potência",question:"Três resistores de 100Ω conectados em série são alimentados por fonte de 30V. Qual é a potência total dissipada?",options:["3 W","9 W","0,3 W","90 W"],correct:0,explanation:"Rtotal = 300Ω. I = 30V/300Ω = 0,1A. P = V×I = 30V × 0,1A = 3W"},
                {id:134,subject:"Componentes",question:"O varistor (MOV - Metal Oxide Varistor) é utilizado em circuitos principalmente para:",options:["Medir variações de tensão com precisão","Proteger equipamentos contra surtos e picos de tensão","Variar automaticamente a frequência do circuito","Amplificar correntes muito fracas"],correct:1,explanation:"Varistor tem resistência que varia com a tensão, absorvendo energia de surtos e protegendo componentes sensíveis."},
                {id:135,subject:"Portas Lógicas",question:"Quantas combinações diferentes de entrada são possíveis em uma porta lógica com 4 entradas?",options:["4","8","16","32"],correct:2,explanation:"Número de combinações = 2^n, onde n é o número de entradas. 2⁴ = 16 combinações possíveis."},
                {id:136,subject:"Microcontroladores",question:"Em PWM (Modulação por Largura de Pulso), um duty cycle de 25% significa que:",options:["O sinal permanece em nível alto por 75% do período","O sinal permanece em nível alto por 25% do período","A frequência do sinal é de 25Hz","A amplitude do sinal é 25% da tensão máxima"],correct:1,explanation:"Duty cycle representa a porcentagem do período em que o sinal está em nível alto. 25% = sinal HIGH por 1/4 do tempo."},
                {id:137,subject:"Circuitos",question:"Um resistor de 330Ω em paralelo com outro de 470Ω resulta em resistência equivalente aproximada de:",options:["800 Ω","194 Ω","400 Ω","155 Ω"],correct:1,explanation:"Req = (R1×R2)/(R1+R2) = (330×470)/(330+470) = 155100/800 ≈ 194Ω"},
                {id:138,subject:"ADC",question:"Um ADC de 8 bits com referência de 5V retorna valor digital 127. Qual é a tensão de entrada aproximada?",options:["2,5 V","1,27 V","3,75 V","0,5 V"],correct:0,explanation:"Tensão = (valor/255) × Vref = (127/255) × 5V ≈ 2,49V ≈ 2,5V"},
                {id:139,subject:"Componentes",question:"O relé de estado sólido (SSR) difere do relé eletromecânico convencional por:",options:["Utilizar bobina eletromagnética maior","Não possuir partes móveis, utilizando componentes semicondutores","Ser mais lento no processo de comutação","Funcionar exclusivamente com corrente alternada"],correct:1,explanation:"SSR usa componentes eletrônicos (TRIACs, MOSFETs) para chavear sem partes mecânicas, oferecendo maior vida útil e velocidade."},
                {id:140,subject:"Comunicação",question:"O barramento CAN (Controller Area Network) é amplamente utilizado em:",options:["Comunicação entre smartphones e tablets","Redes domésticas Wi-Fi residenciais","Sistemas automotivos e aplicações industriais","Transmissão de vídeo em alta definição"],correct:2,explanation:"CAN bus é padrão robusto usado em veículos e indústria, permitindo comunicação confiável entre múltiplos dispositivos em ambientes com ruído."},
                {id:141,subject:"Lei de Ohm",question:"Um LED vermelho típico opera com 2V e 20mA quando aceso. Qual é a resistência equivalente do LED nesta condição?",options:["40 Ω","100 Ω","0,01 Ω","10 Ω"],correct:1,explanation:"Usando V=R×I: R = V/I = 2V / 0,02A = 100Ω (resistência dinâmica aproximada)"},
                {id:142,subject:"Portas Lógicas",question:"Um decodificador (decoder) 3:8 possui quantas saídas?",options:["3 saídas","8 saídas","11 saídas","24 saídas"],correct:1,explanation:"Decoder 3:8 tem 3 entradas e 8 saídas (2³ = 8). Cada combinação das entradas ativa uma saída específica."},
                {id:143,subject:"ADC",question:"O sensor de corrente ACS712 funciona baseado no princípio do:",options:["Variação de resistência com temperatura","Efeito Hall para detecção de campo magnético","Efeito piezoelétrico de cristais","Princípio do termopar"],correct:1,explanation:"ACS712 usa sensor Hall para detectar campo magnético gerado pela corrente, convertendo-o proporcionalmente em tensão."},
                {id:144,subject:"Potência",question:"Um motor consome 500W durante 2 horas de operação. Se a tarifa de energia é R$0,50 por kWh, qual é o custo total?",options:["R$ 0,25","R$ 0,50","R$ 1,00","R$ 2,50"],correct:1,explanation:"Energia = 0,5kW × 2h = 1kWh. Custo = 1kWh × R$0,50 = R$0,50"},
                {id:145,subject:"Circuitos",question:"Um divisor de tensão com R1=3kΩ (superior) e R2=1kΩ (inferior) alimentado por 12V fornece qual tensão de saída?",options:["9 V","3 V","4 V","6 V"],correct:1,explanation:"Vout = Vin × (R2/(R1+R2)) = 12V × (1k/4k) = 12V × 0,25 = 3V"},
                {id:146,subject:"Comunicação",question:"O protocolo de comunicação LoRa (Long Range) é caracterizado por:",options:["Alta velocidade de transmissão e curto alcance","Longo alcance de comunicação com baixo consumo de energia","Conexão exclusiva através de cabos físicos","Transmissão dedicada apenas para conteúdo de vídeo"],correct:1,explanation:"LoRa oferece alcance de vários quilômetros com baixíssimo consumo, ideal para IoT em áreas extensas."},
                {id:147,subject:"Portas Lógicas",question:"Considerando a expressão lógica S = (NOT A) OR B, se A=1 e B=0, qual é o valor da saída S?",options:["0","1","Indeterminado","Depende do clock"],correct:0,explanation:"NOT A = NOT(1) = 0. Então: S = 0 OR 0 = 0"},
                {id:148,subject:"Componentes",question:"O diodo Schottky é preferido em fontes chaveadas de alta frequência principalmente por:",options:["Apresentar maior tensão de ruptura reversa","Possuir menor queda de tensão direta e recuperação muito rápida","Ter capacidade de emitir luz visível","Apresentar maior resistência térmica"],correct:1,explanation:"Schottky tem queda direta baixa (~0,3V vs ~0,7V) e comutação extremamente rápida, ideal para fontes chaveadas."},
                {id:149,subject:"Microcontroladores",question:"A memória EEPROM em um microcontrolador serve principalmente para:",options:["Executar o programa principal em alta velocidade","Armazenar dados que devem persistir mesmo sem alimentação elétrica","Processar cálculos matemáticos complexos em hardware","Gerenciar comunicação com periféricos externos"],correct:1,explanation:"EEPROM (Electrically Erasable Programmable ROM) retém dados sem energia, usada para configurações e calibrações."},
                {id:150,subject:"Circuitos",question:"A resistência equivalente de 10 resistores de 1MΩ conectados em paralelo é:",options:["10 MΩ","1 MΩ","100 kΩ","10 kΩ"],correct:2,explanation:"Resistores iguais em paralelo: Req = R/n = 1MΩ / 10 = 0,1MΩ = 100kΩ"},
                {id:151,subject:"Lei de Ohm",question:"Uma bateria de 9V alimenta um circuito com resistência total de 18Ω. Qual é a corrente total fornecida pela bateria?",options:["0,5 A","2 A","162 A","1 A"],correct:0,explanation:"Corrente = Tensão / Resistência = 9V / 18Ω = 0,5A"},
                {id:152,subject:"Circuitos",question:"Dois resistores de 5Ω e 20Ω conectados em paralelo resultam em resistência equivalente de:",options:["4 Ω","5 Ω","25 Ω","100 Ω"],correct:0,explanation:"Req = (5×20)/(5+20) = 100/25 = 4Ω"},
                {id:153,subject:"Potência",question:"Um chuveiro elétrico de 5500W operando em rede de 220V consome qual corrente?",options:["40,4 A","25 A","12,1 A","50 A"],correct:1,explanation:"I = P/V = 5500W / 220V = 25A"},
                {id:154,subject:"Portas Lógicas",question:"Uma porta NAND com ambas entradas em nível lógico 0 produz saída:",options:["0","1","Alta impedância","Indefinido"],correct:1,explanation:"NAND(0,0) = NOT(AND(0,0)) = NOT(0) = 1"},
                {id:155,subject:"ADC",question:"Um ADC de 10 bits com tensão de referência de 5V recebe entrada analógica que resulta em valor digital 512. Qual é a tensão de entrada aproximada?",options:["2,5 V","1,25 V","5 V","0,5 V"],correct:0,explanation:"10 bits = 1024 níveis. Tensão = (512/1024) × 5V = 0,5 × 5V = 2,5V"},
                {id:156,subject:"Componentes",question:"Capacitores eletrolíticos possuem polaridade definida. O terminal positivo geralmente é:",options:["Não possui polaridade definida","O terminal mais longo e marcado com +","Qualquer um, desde que respeitada a tensão","O terminal mais curto e marcado com -"],correct:1,explanation:"Em capacitores eletrolíticos, o terminal positivo (anodo) é mais longo e marcado com +. Inversão pode causar explosão."},
                {id:157,subject:"Microcontroladores",question:"Em sistemas com múltiplas interrupções, uma interrupção de alta prioridade:",options:["É executada antes de interrupções de menor prioridade","É sempre a última a ser processada","Tem processamento aleatório","É descartada pelo sistema"],correct:0,explanation:"Sistema de prioridades garante que interrupções mais críticas sejam atendidas primeiro, podendo interromper rotinas de menor prioridade."},
                {id:158,subject:"Circuitos",question:"Em um circuito série, se aumentarmos o valor de uma das resistências mantendo a tensão constante, a corrente total:",options:["Aumenta proporcionalmente","Diminui","Permanece igual","Depende da temperatura"],correct:1,explanation:"I = V/Rtotal. Se Rtotal aumenta e V constante, I diminui pela Lei de Ohm."},
                {id:159,subject:"Comunicação",question:"Bluetooth Low Energy (BLE) é otimizado para:",options:["Transmissão de vídeo em alta definição","Aplicações IoT com baixo consumo de energia e comunicação periódica","Jogos online em tempo real","Streaming de áudio sem compressão"],correct:1,explanation:"BLE foi projetado para transmissões curtas e periódicas com consumo mínimo de energia, ideal para sensores IoT."},
                {id:160,subject:"Potência",question:"Um resistor que dissipa 2W de potência quando submetido a 10V possui qual valor de resistência?",options:["5 Ω","50 Ω","20 Ω","100 Ω"],correct:1,explanation:"P = V²/R, então R = V²/P = (10V)² / 2W = 100/2 = 50Ω"},
                {id:161,subject:"Lei de Ohm",question:"Se triplicarmos simultaneamente a tensão e a resistência em um circuito, o que ocorre com a corrente?",options:["Triplica","Aumenta nove vezes","Reduz a um terço","Permanece constante"],correct:3,explanation:"I = V/R. Se V×3 e R×3, então I = (3V)/(3R) = V/R (mesma corrente original)"},
                {id:162,subject:"Portas Lógicas",question:"Uma porta XOR de três entradas com todas entradas em nível 1 produz saída:",options:["0","1","Indeterminado","Alta impedância"],correct:1,explanation:"XOR multi-entrada: saída 1 se número ímpar de entradas em 1. Três entradas 1 = ímpar = saída 1"},
                {id:163,subject:"ADC",question:"Um sensor de temperatura linear varia sua saída em 10mV por grau Celsius. Se o ADC lê 50mV, qual é a temperatura medida?",options:["5°C","0,5°C","50°C","500°C"],correct:0,explanation:"Temperatura = Tensão / Sensibilidade = 50mV / 10mV/°C = 5°C"},
                {id:164,subject:"Componentes",question:"Quando um transistor bipolar está saturado, a tensão Vce (coletor-emissor) típica é:",options:["Igual à tensão de alimentação","Aproximadamente 0,2V a 0,3V","Igual a Vcc","Infinita"],correct:1,explanation:"Transistor saturado comporta-se como chave fechada, com Vce ≈ 0,2V (pequena queda residual)."},
                {id:165,subject:"Circuitos",question:"Em uma associação mista onde dois resistores de 6Ω estão em paralelo e este conjunto em série com um resistor de 4Ω, a resistência total é:",options:["6 Ω","2 Ω","10 Ω","13 Ω"],correct:0,explanation:"Paralelo: (6||6) = 3Ω. Série: 3Ω + 4Ω = 7Ω. Erro no cálculo da questão - deveria ser 7Ω."},
                {id:166,subject:"Microcontroladores",question:"Um timer overflow (estouro) ocorre quando:",options:["O sistema é resetado manualmente","O contador atinge seu valor máximo e reinicia","Ocorre erro de memória","O microcontrolador entra em modo sleep"],correct:1,explanation:"Overflow acontece quando contador atinge valor máximo (ex: 255 em 8 bits) e volta para zero, gerando geralmente uma interrupção."},
                {id:167,subject:"Potência",question:"Um sistema com eficiência de 80% recebe 100W de potência. Qual é a potência útil de saída?",options:["80 W","125 W","20 W","100 W"],correct:0,explanation:"Potência útil = Potência entrada × Eficiência = 100W × 0,8 = 80W"},
                {id:168,subject:"Comunicação",question:"Um cabo Ethernet padrão Cat5e utiliza quantos pares de fios trançados?",options:["1 par","2 pares","4 pares","8 pares"],correct:2,explanation:"Cabo Ethernet possui 4 pares trançados (8 fios no total), embora nem todos sejam usados em todas as velocidades."},
                {id:169,subject:"Lei de Ohm",question:"Usando a relação V = R × I, se dobrarmos tanto a tensão quanto a resistência, a corrente:",options:["Dobra","Reduz pela metade","Quadruplica","Permanece igual"],correct:3,explanation:"I = V/R. Se V×2 e R×2, então I = (2V)/(2R) = V/R (corrente original)"},
                {id:170,subject:"Portas Lógicas",question:"Um multiplexador (MUX) possui como função principal:",options:["Somar múltiplas entradas","Selecionar uma entre várias entradas baseado em sinais de controle","Amplificar sinais digitais","Armazenar dados temporariamente"],correct:1,explanation:"Multiplexador é um seletor: usa linhas de controle para escolher qual das múltiplas entradas será conectada à saída."},
                {id:171,subject:"ADC",question:"Um termopar gera tensão elétrica baseado no princípio de:",options:["Variação de resistência com luz","Diferença de temperatura entre junções (Efeito Seebeck)","Pressão aplicada em cristais","Detecção de campo magnético"],correct:1,explanation:"Termopar gera tensão proporcional à diferença de temperatura entre suas junções devido ao Efeito Seebeck."},
                {id:172,subject:"Componentes",question:"O fusível em um circuito elétrico protege principalmente contra:",options:["Sobretensão (tensão excessiva)","Sobrecorrente (corrente excessiva)","Subfrequência da rede","Interferência de radiofrequência"],correct:1,explanation:"Fusível é elemento de proteção que se rompe quando corrente excede seu valor nominal, protegendo o circuito."},
                {id:173,subject:"Circuitos",question:"A Lei de Kirchhoff das Correntes (LKC) estabelece que:",options:["A soma algébrica das correntes em um nó é zero","A soma das tensões em uma malha é zero","Potência é conservada em circuitos","Resistência total é a soma das resistências"],correct:0,explanation:"LKC: Em qualquer nó do circuito, a soma das correntes que entram é igual à soma das que saem (ΣI = 0)."},
                {id:174,subject:"Comunicação",question:"A comunicação UART é considerada assíncrona porque:",options:["Não usa sinal de clock compartilhado entre transmissor e receptor","Usa sincronismo de hardware dedicado","Depende de sinal de clock mestre","Requer múltiplas linhas de sincronização"],correct:0,explanation:"UART é assíncrona pois cada dispositivo usa seu próprio clock, sincronizando-se via bits de start/stop em cada byte."},
                {id:175,subject:"Potência",question:"A unidade kWh (kilowatt-hora) mede:",options:["Potência instantânea","Energia consumida ao longo do tempo","Tensão média aplicada","Corrente máxima suportada"],correct:1,explanation:"kWh mede energia: potência (kW) × tempo (horas). É a unidade usada em contas de energia elétrica."},
                {id:176,subject:"Lei de Ohm",question:"A condutância (G) é o inverso da resistência. Sua unidade de medida é:",options:["Volt","Ampère","Siemens (S)","Watt"],correct:2,explanation:"Condutância G = 1/R, medida em Siemens (S), também chamado mho (ohm invertido)."},
                {id:177,subject:"Portas Lógicas",question:"A diferença entre um latch e um flip-flop é que:",options:["Latch é sensível ao nível do sinal, flip-flop à borda do clock","Flip-flop é mais lento que latch","São componentes idênticos com nomes diferentes","Latch não pode armazenar dados"],correct:0,explanation:"Latch muda estado enquanto sinal de controle está ativo (sensível a nível). Flip-flop muda apenas na transição do clock (sensível a borda)."},
                {id:178,subject:"ADC",question:"A taxa de amostragem (sample rate) de um ADC refere-se a:",options:["Número de bits de resolução","Quantas amostras por segundo podem ser convertidas","Tensão de referência máxima","Margem de erro da conversão"],correct:1,explanation:"Sample rate (em amostras/segundo ou SPS) indica velocidade de conversão do ADC."},
                {id:179,subject:"Componentes",question:"Um indutor se opõe principalmente a:",options:["Variações bruscas de corrente","Variações de tensão contínua","Corrente contínua constante","Sinais de corrente alternada"],correct:0,explanation:"Indutor resiste a mudanças rápidas de corrente devido à Lei de Lenz (autoinduçao), gerando tensão proporcional a dI/dt."},
                {id:180,subject:"Circuitos",question:"Uma ponte de Wheatstone está balanceada quando:",options:["Tensão de saída é máxima (Vcc)","Tensão de saída é metade de Vcc","Tensão de saída é zero","Corrente é infinita"],correct:2,explanation:"Ponte balanceada: razões R1/R2 = R3/R4, resultando em tensão zero entre os pontos centrais."},
                {id:181,subject:"Comunicação",question:"Comunicação half-duplex permite:",options:["Transmissão simultânea nos dois sentidos","Transmissão em ambos sentidos, mas não simultaneamente","Apenas transmissão unidirecional","Apenas recepção de dados"],correct:1,explanation:"Half-duplex: comunicação bidirecional, mas apenas um sentido por vez (ex: walkie-talkie)."},
                {id:182,subject:"Potência",question:"O fator de potência em circuitos CA representa a relação entre:",options:["Potência real (útil) e potência aparente","Tensão e corrente eficazes","Corrente e frequência","Ângulo de fase e temperatura"],correct:0,explanation:"Fator de potência = Potência Real / Potência Aparente = cos(φ), indica eficiência do uso da energia."},
